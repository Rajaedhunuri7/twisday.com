<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — Twisday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo">Twisday</a>
    <p class="tagline">Thoughts &amp; feelings, one weekend at a time</p>
  </header>

  <main class="post-main">
    <article class="post-single" id="post-content">
      <p class="loading" id="loading">Loading…</p>
    </article>
    <nav class="post-nav">
      <a href="index.html" class="back-link">← All posts</a>
    </nav>
  </main>

  <footer class="site-footer">
    <p>Written with care · Updated every weekend</p>
  </footer>

  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const container = document.getElementById('post-content');
    const loading = document.getElementById('loading');

    if (id === null || id === '') {
      loading.textContent = 'No post selected.';
      setTimeout(() => window.location.assign('index.html'), 1500);
    } else {
      loadPosts().then(posts => {
        const index = parseInt(id, 10);
        if (!posts || isNaN(index) || index < 0 || index >= posts.length) {
          loading.textContent = 'Post not found.';
          setTimeout(() => window.location.assign('index.html'), 1500);
          return;
        }
        const post = posts[index];
        loading.remove();
        document.title = `${post.title} — Twisday`;
        container.innerHTML = `
          <header class="post-header">
            <time datetime="${post.date}">${formatDate(post.date)}</time>
            <h1>${escapeHtml(post.title)}</h1>
          </header>
          <div class="post-body">${formatContent(post.content)}</div>
        `;
      });
    }
  </script>
</body>
</html>
